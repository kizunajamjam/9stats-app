<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9stats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ホーム画面 -->
    <div class="screen home-screen" id="home-screen">
        <div class="home-title">9stats</div>
        <div class="home-menu">
            <button class="home-btn" onclick="goRecord()">記録</button>
            <button class="home-btn" onclick="goSettings()">設定</button>
            <button class="home-btn" onclick="goHistory()">実績</button>
        </div>
    </div>

    <div class="screen app-container" id="record-screen">
        <!-- ヘッダーエリア（最小の1行） -->
        <header class="app-header">
            <div class="header-minimal-row">
                <button class="action-btn-mini" onclick="goHome()">ホーム</button>

                <div class="score-board-mini">
                    <span class="score-side-label">自:</span>
                    <button class="score-btn-mini" onclick="manualAdjustScore('home', -1)">-</button>
                    <span id="score-home" class="score-val-mini">0</span>
                    <button class="score-btn-mini" onclick="manualAdjustScore('home', 1)">+</button>

                    <span class="sets-mini">(<span id="sets-home">0</span>-<span id="sets-away">0</span>)</span>

                    <span class="score-side-label">相:</span>
                    <button class="score-btn-mini" onclick="manualAdjustScore('away', -1)">-</button>
                    <span id="score-away" class="score-val-mini">0</span>
                    <button class="score-btn-mini" onclick="manualAdjustScore('away', 1)">+</button>
                </div>

                <div class="serve-indicator-mini">
                    <span class="status-dot" id="serve-status-dot"></span>
                    <span id="serve-status-text" class="serve-text-mini">1st</span>
                </div>

                <div class="header-actions-mini">
                    <button class="action-btn-mini" id="undo-btn" onclick="undoLastAction()" disabled>戻す</button>
                    <button class="action-btn-mini" onclick="resetMatch()">R</button>
                    <button class="action-btn-mini" onclick="endMatch()">終了</button>
                </div>
            </div>
        </header>

        <!-- メイングリッドエリア -->
        <main class="stats-workspace">
            <div class="set-tabs" id="set-tabs"></div>
            <div class="stats-table-header">
                <div>番</div>
                <div>名</div>
                <div>P</div>
                <div>M</div>
                <div>A</div>
                <div>B</div>
                <div>C</div>
                <div>D</div>
                <div>P</div>
                <div>M</div>
                <div>P</div>
                <div>M</div>
                <div>P</div>
                <div>M</div>
            </div>

            <div class="players-list" id="players-list">
                <!-- JavaScriptで9人分の行を動的に挿入します -->
            </div>
        </main>
    </div>

    <!-- 試合設定画面（選手名・背番号・チーム名・日時・会場） -->
    <div class="screen settings-screen" id="settings-screen">
        <div class="settings-header">
            <button class="action-btn-mini" onclick="goHome()">ホーム</button>
            <span class="settings-title">試合設定</span>
        </div>
        <div class="settings-body">
            <div class="settings-grid">
                <label class="settings-label" for="input-date">日時</label>
                <input class="settings-input" type="date" id="input-date" onchange="updateMatchInfo('date', this.value)">

                <label class="settings-label" for="input-venue">会場</label>
                <input class="settings-input" type="text" id="input-venue" placeholder="会場名" onchange="updateMatchInfo('venue', this.value)">

                <label class="settings-label" for="input-team">自チーム名</label>
                <input class="settings-input" type="text" id="input-team" placeholder="自チーム名" onchange="updateMatchInfo('teamName', this.value)">

                <label class="settings-label" for="input-opponent">対戦相手</label>
                <input class="settings-input" type="text" id="input-opponent" placeholder="対戦相手チーム名" onchange="updateMatchInfo('opponent', this.value)">

                <label class="settings-label" for="input-target-score">セット点数</label>
                <input class="settings-input" type="number" id="input-target-score" min="1" onchange="updateRule('targetScore', this.value)">

                <label class="settings-label" for="input-deuce-margin">デュース差</label>
                <input class="settings-input" type="number" id="input-deuce-margin" min="0" onchange="updateRule('deuceMargin', this.value)">
            </div>
            <p class="settings-hint">デュース差を0にすると、セット点数に達した時点で即セット終了します。</p>

            <div class="roster-section">
                <div class="roster-title-row">
                    <div class="roster-title">選手登録 <span id="roster-count"></span></div>
                    <button class="action-btn-mini primary" id="roster-add-btn" onclick="addRosterPlayer()">+ 追加</button>
                </div>
                <div class="roster-header-row">
                    <span>状態</span>
                    <span>番</span>
                    <span>名前</span>
                </div>
                <div id="roster-list"></div>
            </div>
        </div>
    </div>

    <!-- 実績画面（試合履歴の保存・一覧・詳細） -->
    <div class="screen settings-screen" id="history-screen">
        <div class="settings-header">
            <button class="action-btn-mini" onclick="goHome()">ホーム</button>
            <span class="settings-title">実績</span>
        </div>
        <div class="settings-body">
            <button class="action-btn-mini primary" onclick="saveCurrentMatchToHistory()">現在の試合を保存</button>

            <div id="history-list-view">
                <div id="history-list"></div>
            </div>

            <div id="history-detail-view" style="display: none;">
                <button class="action-btn-mini" onclick="showHistoryList()">一覧に戻る</button>
                <div id="history-detail-summary"></div>
                <div id="history-detail-table"></div>
                <button class="action-btn-mini primary" id="history-detail-csv-btn">CSV</button>
            </div>
        </div>
    </div>

    <!-- 選手交代モーダル -->
    <div class="sub-modal-overlay" id="sub-modal-overlay" style="display: none;">
        <div class="sub-modal">
            <div class="sub-modal-title">交代する選手を選択</div>
            <div id="sub-modal-list"></div>
            <button class="action-btn-mini" onclick="closeSubPicker()">キャンセル</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
